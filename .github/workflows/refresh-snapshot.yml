name: Refresh fundamentals snapshot

# Keeps the offline backstop (lib/data/fundamentals.ts) from going stale by
# re-pulling live fundamentals once a month and opening a PR with the diff for
# review. It never commits to the snapshot directly — a human always reviews the
# data change before it merges. Run on demand from the Actions tab too.
on:
  schedule:
    - cron: "17 6 1 * *" # 06:17 UTC on the 1st of each month
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Regenerate snapshot from live providers
        run: npm run refresh:snapshot
        env:
          # Optional — enriches ROIC / FCF growth / region mix. Yahoo-only without it.
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      - name: Open PR if the snapshot changed
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/snapshot-refresh
          base: main
          draft: true
          commit-message: "Refresh bundled fundamentals snapshot"
          title: "Refresh bundled fundamentals snapshot"
          labels: data, automated
          body: |
            Automated monthly refresh of `lib/data/fundamentals.ts` from the live
            providers (Yahoo + FMP when a key is configured).

            Only values that drifted beyond tolerance were rewritten; curated
            identity fields (symbol, name, sector, industry, ETF look-through) and
            the analyst target band are preserved. **Review the data diff before
            merging** — provider feeds can be noisy.
